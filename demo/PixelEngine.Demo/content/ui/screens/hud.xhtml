<rml title="HUD" data-screen="hud" data-contract="demo.webfirst.hud/v3" style="left: 14px; top: 14px; width: 316px; height: 244px">
  <head>
    <style>
      body { margin: 0px; font-family: "Noto Sans SC"; color: #e8edf2; background-color: transparent; }
      p { margin: 3px 0px; }
      #status_panel { position: absolute; left: 16px; top: 16px; width: 286px; height: 126px; padding: 14px; background-color: rgba(4, 8, 13, 218); border-width: 1px; border-color: #40546a; }
      #objective_panel { position: absolute; left: 650px; top: 16px; width: 356px; height: 212px; padding: 14px; background-color: rgba(4, 8, 13, 218); border-width: 1px; border-color: #6d5935; }
      #status_title { color: #f5f7fa; font-size: 15px; }
      #hud_title { color: #f1c264; font-size: 13px; }
      #hud_route, #hud_region, #hud_seed_label, #hud_seed, #hud_depth_label, #hud_depth_value { color: #9facbb; font-size: 11px; }
      progress { position: relative; display: block; height: 13px; margin-top: 3px; background-color: #18232f; border-width: 1px; border-color: #34495e; }
      progress fill { background-color: #d2a642; }
      progress .meter_label { position: absolute; left: 6px; top: -1px; height: 13px; line-height: 13px; color: #f1f5f9; font-size: 10px; }
      #status_panel progress { width: 270px; }
      #objective_panel progress { width: 340px; }
      #hud_health fill { background-color: #3ca66f; }
      #hud_ammo fill { background-color: #d3a341; }
      #hud_cooldown fill { background-color: #4f86bd; }
      #hud_heat fill, #hud_hazard fill { background-color: #d05a49; }
      #hud_reload fill { background-color: #7b6cb2; }
      #hud_distance fill { background-color: #d7aa48; }
      #hud_longitude fill { background-color: #4b83b8; }
      #hud_depth fill { background-color: #8b6cb0; }
      #hud_elevation fill { background-color: #4a9b7b; }
      button { width: 126px; height: 32px; color: #dfe8f1; text-align: center; background-color: rgba(18, 35, 51, 232); border-width: 1px; border-color: #45637e; }
      button:hover { color: #ffffff; background-color: #315b7e; border-color: #75a0c5; }
      #hud_pause { position: absolute; left: 16px; top: 174px; }
      #hud_telemetry { position: absolute; left: 154px; top: 174px; }
      #legacy_route_models { display: none; }
    </style>
  </head>
  <body>
    <div id="status_panel">
      <p id="status_title">生存状态</p>
      <progress id="hud_health" path="hud.health" value="1.0" text="生命"><div class="meter_label">生命</div></progress>
      <progress id="hud_ammo" path="hud.ammo" value="0.0" text="弹药"><div class="meter_label">弹药</div></progress>
      <progress id="hud_cooldown" path="hud.cooldown" value="1.0" text="冷却"><div class="meter_label">冷却</div></progress>
      <progress id="hud_heat" path="hud.heat" value="0.0" text="热量"><div class="meter_label">热量</div></progress>
      <progress id="hud_reload" path="hud.reload" value="0.0" text="换弹"><div class="meter_label">换弹</div></progress>
    </div>
    <div id="objective_panel">
      <p id="hud_title" path="hud.mode_text">战役 / Campaign</p>
      <p id="hud_route" path="hud.run_state_text">探索 / Exploring</p>
      <p id="hud_region" path="hud.region_text">碎脉矿层 / Shattered Lode</p>
      <p id="hud_seed_label">Seed</p>
      <p id="hud_seed" path="hud.seed_text">0000000000000000</p>
      <p id="hud_depth_label">深度 cell</p>
      <p id="hud_depth_value" path="hud.depth_cells">0</p>
      <progress id="hud_distance" path="hud.distance" value="0.0" text="探索距离"><div class="meter_label">探索距离</div></progress>
      <progress id="hud_depth" path="hud.depth" value="0.0" text="地下深度"><div class="meter_label">地下深度</div></progress>
      <progress id="hud_longitude" path="hud.longitude" value="0.5" text="东西方位"><div class="meter_label">东西方位</div></progress>
    </div>
    <button id="hud_pause" data-event-click="pause_game">暂停</button>
    <button id="hud_telemetry" data-event-click="toggle_telemetry">诊断</button>
    <div id="legacy_route_models">
      <progress path="hud.crystals" value="0.0"></progress>
      <progress path="hud.time" value="0.0"></progress>
      <progress path="hud.hazard" value="0.0"></progress>
      <progress path="hud.score" value="0.0"></progress>
      <progress path="hud.elevation" value="0.0"></progress>
    </div>
  </body>
</rml>
