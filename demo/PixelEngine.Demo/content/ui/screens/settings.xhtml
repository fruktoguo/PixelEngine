<rml title="设置" data-screen="settings" data-contract="demo.webfirst.settings/v1" style="left: 100px; top: 120px; width: 488px; height: 348px">
  <head>
    <style>
      body { margin: 0px; font-family: "Noto Sans SC"; color: #edf4ff; background-color: transparent; }
      #settings_panel { position: absolute; left: 100px; top: 120px; width: 440px; height: 300px; padding: 24px; background-color: rgba(13, 20, 28, 246); border-width: 1px; border-color: #526f8b; }
      #settings_title { position: absolute; left: 24px; top: 18px; color: #f5c451; font-size: 24px; }
      #settings_audio_hint, #settings_vsync_hint { position: absolute; left: 24px; width: 392px; color: #b8c5d2; font-size: 13px; }
      #settings_audio_hint { top: 62px; }
      #settings_vsync_hint { top: 88px; }
      #settings_vsync, #settings_audio { position: absolute; left: 24px; width: 392px; height: 34px; }
      #settings_vsync { top: 132px; }
      #settings_audio { top: 178px; }
      button { position: absolute; left: 24px; top: 238px; width: 160px; height: 38px; background-color: #315f8d; color: #ffffff; border-width: 1px; border-color: #527ca4; }
      button:hover { background-color: #4076a5; }
      p { margin: 0px; }
    </style>
  </head>
  <body>
    <div id="settings_panel">
      <p id="settings_title">设置</p>
      <p id="settings_audio_hint">音频总开关会改写运行时 AudioSystem。</p>
      <p id="settings_vsync_hint">Present VSync 会改写当前窗口交换策略。</p>
      <checkbox id="settings_vsync" path="settings.vsync" text="Present VSync" checked="true" data-event-change="toggle_vsync" />
      <checkbox id="settings_audio" path="settings.audio" text="音频总开关" checked="true" data-event-change="toggle_audio" />
      <button id="settings_back" data-event-click="back_main">返回</button>
    </div>
  </body>
</rml>
