<rml title="PixelEngine 主菜单" style="left: 24px; top: 24px; width: 280px; height: 206px">
  <head>
    <style>
      body { font-family: "Noto Sans SC"; color: #e8edf2; background-color: rgba(8, 12, 16, 210); }
      button { width: 180px; height: 28px; margin-top: 6px; color: #ffffff; background-color: #2f7dd1; }
      #start_game { position: absolute; left: 28px; top: 72px; }
      #open_settings { position: absolute; left: 28px; top: 106px; }
      #open_inventory { position: absolute; left: 28px; top: 140px; }
      #open_dialog { position: absolute; left: 28px; top: 174px; }
      p { margin: 4px 0px; }
    </style>
  </head>
  <body>
    <p id="main_title">PixelEngine 熔岩矿洞</p>
    <p id="main_hint">跑动、跳跃、切割地形并撤离。</p>
    <button id="start_game" data-event-click="start_game">开始游戏</button>
    <button id="open_settings" data-event-click="open_settings">设置</button>
    <button id="open_inventory" data-event-click="open_inventory">背包</button>
    <button id="open_dialog" data-event-click="open_dialog">对话</button>
  </body>
</rml>
