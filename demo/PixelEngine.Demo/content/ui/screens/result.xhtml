<rml title="结算" data-screen="result" data-contract="demo.webfirst.result/v1" style="left: 326px; top: 70px; width: 380px; height: 330px">
  <head>
    <style>
      body { margin: 0px; font-family: "Noto Sans SC"; color: #f5f8ff; background-color: transparent; }
      #result_panel { position: absolute; left: 326px; top: 70px; width: 348px; height: 298px; padding: 16px; background-color: rgba(9, 12, 18, 242); border-width: 1px; border-color: #596d87; }
      #result_title { color: #f5c451; font-size: 23px; }
      #result_state { color: #f8fafc; font-size: 18px; }
      #result_win_hint, #result_loss_hint { color: #b7c3d3; }
      progress { position: relative; display: block; width: 286px; height: 14px; margin-top: 4px; background-color: #202b38; border-width: 1px; border-color: #52647c; }
      progress fill { background-color: #d2a642; }
      progress .meter_label { position: absolute; left: 6px; top: -1px; height: 14px; line-height: 14px; color: #f8fafc; font-size: 11px; }
      #result_won fill { background-color: #42ad72; }
      button { width: 132px; height: 30px; margin-top: 10px; background-color: #315f8d; color: #ffffff; border-width: 1px; border-color: #527ca4; }
      button:hover { background-color: #4076a5; }
      p { margin: 4px 0px; }
    </style>
  </head>
  <body>
    <div id="result_panel">
      <p id="result_title">结算</p>
      <p id="result_state">抵达右侧出口 / 挑战失败</p>
      <p id="result_win_hint">胜利：进入右侧出口触发区。</p>
      <p id="result_loss_hint">失败：生命耗尽或路线中断。</p>
      <progress id="result_won" path="result.won" value="0.0" text="胜利"><div class="meter_label">胜利</div></progress>
      <progress id="result_crystals" path="result.crystals" value="0.0" text="出口进度"><div class="meter_label">出口进度</div></progress>
      <progress id="result_time" path="result.time" value="0.0" text="路线余量"><div class="meter_label">路线余量</div></progress>
      <progress id="result_score" path="result.score" value="0.0" text="路线评分"><div class="meter_label">路线评分</div></progress>
      <progress id="result_reason" path="result.reason" value="0.0" text="失败原因记录"><div class="meter_label">失败原因记录</div></progress>
      <button id="result_restart" data-event-click="restart_game">重开</button>
      <button id="result_quit" data-event-click="quit_game">退出</button>
    </div>
  </body>
</rml>
