name: CI

on:
  push:
  pull_request:

env:
  CI: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    name: build-test (${{ matrix.rid }}${{ matrix.build_only == 'true' && ', build-only' || '' }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            runner: windows-latest
            build_only: 'false'
          - rid: win-arm64
            runner: windows-latest
            build_only: 'true'
          - rid: linux-x64
            runner: ubuntu-latest
            build_only: 'false'
          - rid: linux-arm64
            runner: ubuntu-24.04-arm
            build_only: 'false'
          - rid: osx-x64
            runner: macos-15-intel
            build_only: 'false'
          - rid: osx-arm64
            runner: macos-14
            build_only: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Linux arm64 cross toolchain
        if: matrix.rid == 'linux-arm64'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build native
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/build-native.ps1 -Rid ${{ matrix.rid }} -Configuration Release

      - name: Build native
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./tools/build-native.sh --rid "${{ matrix.rid }}" --configuration Release

      - name: Build solution
        if: runner.os == 'Windows'
        shell: pwsh
        run: dotnet build PixelEngine.sln -c Release

      - name: Build solution
        if: runner.os != 'Windows'
        shell: bash
        run: dotnet build PixelEngine.sln -c Release

      - name: Test solution
        id: solution_tests
        if: matrix.build_only != 'true'
        shell: pwsh
        run: |
          $resultsDirectory = 'artifacts/test-results/${{ matrix.rid }}-${{ github.run_id }}-${{ github.run_attempt }}'
          New-Item -ItemType Directory -Force -Path $resultsDirectory | Out-Null
          dotnet test PixelEngine.sln -c Release --no-build --logger "trx" --results-directory $resultsDirectory

      - name: Collect behavior coverage
        id: behavior_coverage
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          $resultsDirectory = 'artifacts/test-results/${{ matrix.rid }}-${{ github.run_id }}-${{ github.run_attempt }}'
          ./tools/run-coverage.ps1 `
            -Configuration Release `
            -OutputRoot 'artifacts/coverage/${{ matrix.rid }}-${{ github.run_id }}-${{ github.run_attempt }}' `
            -FullTestResultsDirectory $resultsDirectory `
            -RunId 'github-${{ github.run_id }}-${{ github.run_attempt }}' `
            -SkipBuild `
            -NoRestore

      - name: Write build-test evidence
        if: always()
        shell: pwsh
        run: |
          ./tools/summarize-ci-test-results.ps1 `
            -ResultsDirectory 'artifacts/test-results/${{ matrix.rid }}-${{ github.run_id }}-${{ github.run_attempt }}' `
            -OutputPath 'artifacts/ci-matrix-evidence/build-test-${{ matrix.rid }}.md' `
            -Rid '${{ matrix.rid }}' `
            -Runner '${{ matrix.runner }}' `
            -RunId '${{ github.run_id }}' `
            -CommitSha '${{ github.sha }}' `
            -BuildOnly '${{ matrix.build_only }}' `
            -TestStepOutcome '${{ steps.solution_tests.outcome }}' `
            -JobStatus '${{ job.status }}' `
            -MinimumTotal 1492

      - name: Upload build-test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-build-test-${{ matrix.rid }}
          if-no-files-found: error
          path: |
            artifacts/ci-matrix-evidence/build-test-${{ matrix.rid }}.md
            artifacts/test-results/${{ matrix.rid }}-${{ github.run_id }}-${{ github.run_attempt }}/**/*.trx

      - name: Upload behavior coverage evidence
        if: always() && matrix.rid == 'win-x64'
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-coverage-${{ matrix.rid }}
          if-no-files-found: error
          path: artifacts/coverage/${{ matrix.rid }}-${{ github.run_id }}-${{ github.run_attempt }}

  benchmark-guard:
    name: benchmark-guard (win-x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build native
        shell: pwsh
        run: ./tools/build-native.ps1 -Rid win-x64 -Configuration Release

      - name: Build solution
        shell: pwsh
        run: dotnet build PixelEngine.sln -c Release

      - name: Disassembly guard
        shell: pwsh
        run: ./tools/disassembly-guard.ps1

      - name: Benchmark regression guard
        shell: pwsh
        run: ./tools/benchmark-regression.ps1 -BaselinePath bench/PixelEngine.Benchmarks/baselines/ci-baseline.json

      - name: Write benchmark guard evidence
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/ci-matrix-evidence | Out-Null
          @(
            "# CI benchmark guard evidence",
            "",
            "| Key | Value |",
            "|---|---|",
            "| runner | windows-latest |",
            "| run_id | ${{ github.run_id }} |",
            "| sha | ${{ github.sha }} |",
            "| conclusion | ${{ job.status }} |"
          ) | Set-Content -Path artifacts/ci-matrix-evidence/benchmark-guard.md -Encoding UTF8

      - name: Upload benchmark guard evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-benchmark-guard
          if-no-files-found: error
          path: artifacts/ci-matrix-evidence/benchmark-guard.md

  verify-publish:
    name: verify-publish (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            runner: windows-latest
          - rid: linux-x64
            runner: ubuntu-latest
          - rid: osx-x64
            runner: macos-15-intel
          - rid: osx-arm64
            runner: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build native
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/build-native.ps1 -Rid ${{ matrix.rid }} -Configuration Release

      - name: Build native
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./tools/build-native.sh --rid "${{ matrix.rid }}" --configuration Release

      - name: Verify publish
        shell: pwsh
        run: ./tools/verify-publish.ps1 -Rid ${{ matrix.rid }}

      - name: Write verify-publish evidence
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/ci-matrix-evidence | Out-Null
          @(
            "# CI verify-publish evidence: ${{ matrix.rid }}",
            "",
            "| Key | Value |",
            "|---|---|",
            "| rid | ${{ matrix.rid }} |",
            "| runner | ${{ matrix.runner }} |",
            "| channels | r2r,aot |",
            "| run_id | ${{ github.run_id }} |",
            "| sha | ${{ github.sha }} |",
            "| conclusion | ${{ job.status }} |"
          ) | Set-Content -Path artifacts/ci-matrix-evidence/verify-publish-${{ matrix.rid }}.md -Encoding UTF8

      - name: Upload verify-publish evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-verify-publish-${{ matrix.rid }}
          if-no-files-found: error
          path: artifacts/ci-matrix-evidence/verify-publish-${{ matrix.rid }}.md

  ci-evidence:
    name: ci-evidence
    needs: [build-test, benchmark-guard, verify-publish]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CI evidence
        uses: actions/download-artifact@v4
        with:
          pattern: ci-evidence-*
          path: artifacts/ci-matrix-evidence
          merge-multiple: true

      - name: Build CI evidence manifest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/ci-matrix-evidence | Out-Null
          @(
            "# CI workflow run evidence",
            "",
            "| Key | Value |",
            "|---|---|",
            "| workflow | CI |",
            "| event | ${{ github.event_name }} |",
            "| run_id | ${{ github.run_id }} |",
            "| run_attempt | ${{ github.run_attempt }} |",
            "| sha | ${{ github.sha }} |",
            "| ref | ${{ github.ref }} |",
            "| aggregator_job_status | ${{ job.status }} |"
          ) | Set-Content -Path artifacts/ci-matrix-evidence/workflow-run.md -Encoding UTF8
          function Get-Sha256([string]$path) {
            return (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
          }
          $manifest = [ordered]@{
            schemaVersion = 1
            workflowRunReport = 'artifacts/ci-matrix-evidence/workflow-run.md'
            workflowRunSha256 = Get-Sha256 'artifacts/ci-matrix-evidence/workflow-run.md'
            benchmarkGuard = [ordered]@{
              report = 'artifacts/ci-matrix-evidence/benchmark-guard.md'
              sha256 = Get-Sha256 'artifacts/ci-matrix-evidence/benchmark-guard.md'
              runner = 'windows-latest'
            }
            buildTest = [ordered]@{
              'win-x64' = [ordered]@{ report = 'artifacts/ci-matrix-evidence/build-test-win-x64.md'; sha256 = Get-Sha256 'artifacts/ci-matrix-evidence/build-test-win-x64.md'; testsRan = $true; runner = 'windows-latest' }
              'win-arm64' = [ordered]@{ report = 'artifacts/ci-matrix-evidence/build-test-win-arm64.md'; sha256 = Get-Sha256 'artifacts/ci-matrix-evidence/build-test-win-arm64.md'; testsRan = $false; runner = 'windows-latest' }
              'linux-x64' = [ordered]@{ report = 'artifacts/ci-matrix-evidence/build-test-linux-x64.md'; sha256 = Get-Sha256 'artifacts/ci-matrix-evidence/build-test-linux-x64.md'; testsRan = $true; runner = 'ubuntu-latest' }
              'linux-arm64' = [ordered]@{ report = 'artifacts/ci-matrix-evidence/build-test-linux-arm64.md'; sha256 = Get-Sha256 'artifacts/ci-matrix-evidence/build-test-linux-arm64.md'; testsRan = $true; runner = 'ubuntu-24.04-arm' }
              'osx-x64' = [ordered]@{ report = 'artifacts/ci-matrix-evidence/build-test-osx-x64.md'; sha256 = Get-Sha256 'artifacts/ci-matrix-evidence/build-test-osx-x64.md'; testsRan = $true; runner = 'macos-15-intel' }
              'osx-arm64' = [ordered]@{ report = 'artifacts/ci-matrix-evidence/build-test-osx-arm64.md'; sha256 = Get-Sha256 'artifacts/ci-matrix-evidence/build-test-osx-arm64.md'; testsRan = $true; runner = 'macos-14' }
            }
            verifyPublish = [ordered]@{
              'win-x64' = [ordered]@{ report = 'artifacts/ci-matrix-evidence/verify-publish-win-x64.md'; sha256 = Get-Sha256 'artifacts/ci-matrix-evidence/verify-publish-win-x64.md'; runner = 'windows-latest' }
              'linux-x64' = [ordered]@{ report = 'artifacts/ci-matrix-evidence/verify-publish-linux-x64.md'; sha256 = Get-Sha256 'artifacts/ci-matrix-evidence/verify-publish-linux-x64.md'; runner = 'ubuntu-latest' }
              'osx-x64' = [ordered]@{ report = 'artifacts/ci-matrix-evidence/verify-publish-osx-x64.md'; sha256 = Get-Sha256 'artifacts/ci-matrix-evidence/verify-publish-osx-x64.md'; runner = 'macos-15-intel' }
              'osx-arm64' = [ordered]@{ report = 'artifacts/ci-matrix-evidence/verify-publish-osx-arm64.md'; sha256 = Get-Sha256 'artifacts/ci-matrix-evidence/verify-publish-osx-arm64.md'; runner = 'macos-14' }
            }
          }
          $manifest | ConvertTo-Json -Depth 10 | Set-Content -Path artifacts/ci-matrix-evidence/evidence.json -Encoding UTF8

      - name: Preflight CI matrix evidence
        shell: pwsh
        run: ./tools/ci-matrix-evidence-preflight.ps1 -EvidenceManifestPath artifacts/ci-matrix-evidence/evidence.json -AllowBlocked

      - name: Upload CI evidence report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-final
          if-no-files-found: error
          path: artifacts/ci-matrix-evidence
