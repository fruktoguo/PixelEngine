name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CI: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  native:
    name: native (${{ matrix.group }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: windows
            runner: windows-latest
            shell: pwsh
            rids: win-x64 win-arm64
          - group: linux
            runner: ubuntu-latest
            shell: bash
            rids: linux-x64 linux-arm64
          - group: macos
            runner: macos-14
            shell: bash
            rids: osx-x64 osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Linux arm64 cross toolchain
        if: matrix.group == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build native
        if: matrix.shell == 'pwsh'
        shell: pwsh
        env:
          RIDS: ${{ matrix.rids }}
        run: |
          foreach ($rid in $env:RIDS.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries)) {
            ./tools/build-native.ps1 -Rid $rid -Configuration Release
          }

      - name: Build native
        if: matrix.shell == 'bash'
        shell: bash
        env:
          RIDS: ${{ matrix.rids }}
        run: |
          for rid in $RIDS; do
            bash ./tools/build-native.sh --rid "$rid" --configuration Release
          done

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.group }}
          if-no-files-found: error
          path: |
            native/out
            runtimes

  publish:
    name: publish (${{ matrix.rid }}, ${{ matrix.channel }})
    needs: native
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]
        channel: [r2r, aot]
        include:
          - rid: win-x64
            runner: windows-latest
            shell: pwsh
          - rid: win-arm64
            runner: windows-latest
            shell: pwsh
          - rid: linux-x64
            runner: ubuntu-latest
            shell: bash
          - rid: linux-arm64
            runner: ubuntu-latest
            shell: bash
          - rid: osx-x64
            runner: macos-15-intel
            shell: bash
          - rid: osx-arm64
            runner: macos-14
            shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          merge-multiple: true

      - name: Resolve release version
        shell: pwsh
        run: |
          $refName = '${{ github.ref_name }}'
          $version = if ($refName.StartsWith('v')) { $refName.Substring(1) } else { '0.1.0-dev' }
          $shortSha = $env:GITHUB_SHA.Substring(0, 8)
          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV
          "INFORMATIONAL_VERSION=$version+$shortSha" >> $env:GITHUB_ENV

      - name: Publish
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          ./tools/publish-${{ matrix.channel }}.ps1 `
            -Rid ${{ matrix.rid }} `
            -Configuration Release `
            -Version $env:RELEASE_VERSION `
            -InformationalVersion $env:INFORMATIONAL_VERSION `
            -SkipNativeBuild

      - name: Publish
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          bash ./tools/publish-${{ matrix.channel }}.sh \
            --rid "${{ matrix.rid }}" \
            --configuration Release \
            --version "$RELEASE_VERSION" \
            --informational-version "$INFORMATIONAL_VERSION" \
            --skip-native-build

      - name: AOT SIMD probe
        if: matrix.channel == 'aot' && matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/release-evidence | Out-Null
          $outputPath = "artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-simd-output.txt"
          try {
            $output = & ./tools/aot-simd-probe.ps1 -Rid ${{ matrix.rid }} -PublishDir artifacts/publish/${{ matrix.rid }}-${{ matrix.channel }} 2>&1
            $exitCode = $LASTEXITCODE
          }
          catch {
            $output = @($_.Exception.Message)
            $exitCode = 1
          }

          $output | Set-Content -Path $outputPath -Encoding UTF8
          $output | ForEach-Object { Write-Host $_ }
          if ($exitCode -ne 0) {
            exit $exitCode
          }

      - name: AOT SIMD probe
        if: matrix.channel == 'aot' && matrix.shell == 'bash'
        shell: bash
        run: |
          mkdir -p artifacts/release-evidence
          set +e
          bash ./tools/aot-simd-probe.sh --rid "${{ matrix.rid }}" --publish-dir "artifacts/publish/${{ matrix.rid }}-${{ matrix.channel }}" 2>&1 | tee "artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-simd-output.txt"
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"

      - name: Write AOT SIMD evidence
        if: always() && matrix.channel == 'aot'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/release-evidence | Out-Null
          $probeOutputPath = "artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-simd-output.txt"
          $probeOutput = if (Test-Path -LiteralPath $probeOutputPath -PathType Leaf) { Get-Content -LiteralPath $probeOutputPath -Raw } else { "probe output missing" }
          @(
            "# AOT SIMD evidence: ${{ matrix.rid }}/${{ matrix.channel }}",
            "",
            "| Key | Value |",
            "|---|---|",
            "| rid | ${{ matrix.rid }} |",
            "| channel | ${{ matrix.channel }} |",
            "| run_id | ${{ github.run_id }} |",
            "| sha | ${{ github.sha }} |",
            "| conclusion | ${{ job.status }} |",
            "",
            "## Probe output",
            "",
            "```text",
            $probeOutput,
            "```"
          ) | Set-Content -Path artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-simd.md -Encoding UTF8

      - name: Upload AOT SIMD evidence
        if: always() && matrix.channel == 'aot'
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-simd-${{ matrix.rid }}-${{ matrix.channel }}
          if-no-files-found: error
          path: artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-simd.md

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ matrix.rid }}-${{ matrix.channel }}
          if-no-files-found: error
          path: artifacts/publish/${{ matrix.rid }}-${{ matrix.channel }}

      - name: Write publish evidence
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/release-evidence | Out-Null
          @(
            "# Publish evidence: ${{ matrix.rid }}/${{ matrix.channel }}",
            "",
            "| Key | Value |",
            "|---|---|",
            "| rid | ${{ matrix.rid }} |",
            "| channel | ${{ matrix.channel }} |",
            "| run_id | ${{ github.run_id }} |",
            "| sha | ${{ github.sha }} |",
            "| conclusion | ${{ job.status }} |"
          ) | Set-Content -Path artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-publish.md -Encoding UTF8

      - name: Upload publish evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-publish-${{ matrix.rid }}-${{ matrix.channel }}
          if-no-files-found: error
          path: artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-publish.md

  verify:
    name: verify (${{ matrix.rid }}, ${{ matrix.channel }})
    needs: publish
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]
        channel: [r2r, aot]
        include:
          - rid: win-x64
            runner: windows-latest
            shell: pwsh
            allow_load_only: 'false'
          - rid: win-arm64
            runner: windows-latest
            shell: pwsh
            allow_load_only: 'true'
          - rid: linux-x64
            runner: ubuntu-latest
            shell: bash
            allow_load_only: 'false'
          - rid: linux-arm64
            runner: ubuntu-latest
            shell: bash
            allow_load_only: 'false'
          - rid: osx-x64
            runner: macos-15-intel
            shell: bash
            allow_load_only: 'false'
          - rid: osx-arm64
            runner: macos-14
            shell: bash
            allow_load_only: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux arm64 smoke runner
        if: matrix.rid == 'linux-arm64'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-${{ matrix.rid }}-${{ matrix.channel }}
          path: artifacts/publish/${{ matrix.rid }}-${{ matrix.channel }}

      - name: Verify publish
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $arguments = @(
            '-Rid', '${{ matrix.rid }}',
            '-Channel', '${{ matrix.channel }}',
            '-PublishDir', 'artifacts/publish/${{ matrix.rid }}-${{ matrix.channel }}',
            '-SkipPublish'
          )
          if ('${{ matrix.allow_load_only }}' -eq 'true') {
            $arguments += '-AllowLoadOnly'
          }
          ./tools/verify-publish.ps1 @arguments

      - name: Verify publish
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          args=(
            --rid "${{ matrix.rid }}"
            --channel "${{ matrix.channel }}"
            --publish-dir "artifacts/publish/${{ matrix.rid }}-${{ matrix.channel }}"
          )
          if [[ "${{ matrix.allow_load_only }}" == "true" ]]; then
            args+=(--allow-load-only)
          fi
          bash ./tools/verify-publish.sh "${args[@]}"

      - name: Write verify evidence
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/release-evidence | Out-Null
          @(
            "# Verify evidence: ${{ matrix.rid }}/${{ matrix.channel }}",
            "",
            "| Key | Value |",
            "|---|---|",
            "| rid | ${{ matrix.rid }} |",
            "| channel | ${{ matrix.channel }} |",
            "| allow_load_only | ${{ matrix.allow_load_only }} |",
            "| run_id | ${{ github.run_id }} |",
            "| sha | ${{ github.sha }} |",
            "| conclusion | ${{ job.status }} |"
          ) | Set-Content -Path artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-verify.md -Encoding UTF8

      - name: Upload verify evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-verify-${{ matrix.rid }}-${{ matrix.channel }}
          if-no-files-found: error
          path: artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-verify.md

  sign-package:
    name: sign-package (${{ matrix.rid }}, ${{ matrix.channel }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]
        channel: [r2r, aot]
        include:
          - rid: win-x64
            runner: windows-latest
            shell: pwsh
          - rid: win-arm64
            runner: windows-latest
            shell: pwsh
          - rid: linux-x64
            runner: ubuntu-latest
            shell: bash
          - rid: linux-arm64
            runner: ubuntu-latest
            shell: bash
          - rid: osx-x64
            runner: macos-15-intel
            shell: bash
          - rid: osx-arm64
            runner: macos-14
            shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-${{ matrix.rid }}-${{ matrix.channel }}
          path: artifacts/publish/${{ matrix.rid }}-${{ matrix.channel }}

      - name: Resolve release version
        shell: pwsh
        run: |
          $refName = '${{ github.ref_name }}'
          $version = if ($refName.StartsWith('v')) { $refName.Substring(1) } else { '0.1.0-dev' }
          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV

      - name: Configure Apple signing keychain
        if: startsWith(matrix.rid, 'osx-')
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: |
          required=(
            APPLE_CERTIFICATE_P12_BASE64
            APPLE_CERTIFICATE_PASSWORD
            APPLE_CODESIGN_IDENTITY
            APPLE_NOTARY_KEY_ID
            APPLE_NOTARY_ISSUER_ID
            APPLE_NOTARY_KEY_P8_BASE64
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required macOS signing secret: $name"
              exit 1
            fi
          done

          keychain="$RUNNER_TEMP/pixelengine-signing.keychain-db"
          keychain_password="$(uuidgen)"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain-db
          security default-keychain -s "$keychain"

          cert_path="$RUNNER_TEMP/developer-id.p12"
          notary_key_path="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$cert_path"
          printf '%s' "$APPLE_NOTARY_KEY_P8_BASE64" | base64 --decode > "$notary_key_path"
          security import "$cert_path" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain"
          xcrun notarytool store-credentials pixelengine-notary \
            --key "$notary_key_path" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID"

      - name: codesign and notarize macOS publish directory
        if: startsWith(matrix.rid, 'osx-')
        shell: bash
        env:
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_NOTARY_PROFILE: pixelengine-notary
        run: |
          bash ./tools/codesign-macos.sh \
            --path "artifacts/publish/${{ matrix.rid }}-${{ matrix.channel }}" \
            --identity "$APPLE_CODESIGN_IDENTITY" \
            --notary-profile "$APPLE_NOTARY_PROFILE"

      - name: Write macOS signing evidence
        if: always() && startsWith(matrix.rid, 'osx-')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/release-evidence | Out-Null
          @(
            "# macOS codesign evidence: ${{ matrix.rid }}/${{ matrix.channel }}",
            "",
            "| Key | Value |",
            "|---|---|",
            "| rid | ${{ matrix.rid }} |",
            "| channel | ${{ matrix.channel }} |",
            "| run_id | ${{ github.run_id }} |",
            "| sha | ${{ github.sha }} |",
            "| conclusion | ${{ job.status }} |"
          ) | Set-Content -Path artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-codesign.md -Encoding UTF8
          @(
            "# macOS notarization evidence: ${{ matrix.rid }}/${{ matrix.channel }}",
            "",
            "| Key | Value |",
            "|---|---|",
            "| rid | ${{ matrix.rid }} |",
            "| channel | ${{ matrix.channel }} |",
            "| run_id | ${{ github.run_id }} |",
            "| sha | ${{ github.sha }} |",
            "| conclusion | ${{ job.status }} |"
          ) | Set-Content -Path artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-notarization.md -Encoding UTF8

      - name: Upload macOS signing evidence
        if: always() && startsWith(matrix.rid, 'osx-')
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-signing-${{ matrix.rid }}-${{ matrix.channel }}
          if-no-files-found: error
          path: |
            artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-codesign.md
            artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-notarization.md

      - name: Package
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          ./tools/package.ps1 `
            -Rid ${{ matrix.rid }} `
            -Channel ${{ matrix.channel }} `
            -Version $env:RELEASE_VERSION `
            -PublishDir artifacts/publish/${{ matrix.rid }}-${{ matrix.channel }}

      - name: Package
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          bash ./tools/package.sh \
            --rid "${{ matrix.rid }}" \
            --channel "${{ matrix.channel }}" \
            --version "$RELEASE_VERSION" \
            --publish-dir "artifacts/publish/${{ matrix.rid }}-${{ matrix.channel }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.rid }}-${{ matrix.channel }}
          if-no-files-found: error
          path: |
            artifacts/package/PixelEngine-Demo-*.zip
            artifacts/package/PixelEngine-Demo-*.tar.gz

      - name: Write package evidence
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/release-evidence | Out-Null
          @(
            "# Package evidence: ${{ matrix.rid }}/${{ matrix.channel }}",
            "",
            "| Key | Value |",
            "|---|---|",
            "| rid | ${{ matrix.rid }} |",
            "| channel | ${{ matrix.channel }} |",
            "| run_id | ${{ github.run_id }} |",
            "| sha | ${{ github.sha }} |",
            "| conclusion | ${{ job.status }} |"
          ) | Set-Content -Path artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-package.md -Encoding UTF8

      - name: Upload package evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-package-${{ matrix.rid }}-${{ matrix.channel }}
          if-no-files-found: error
          path: artifacts/release-evidence/${{ matrix.rid }}-${{ matrix.channel }}-package.md

  release:
    name: release
    needs: sign-package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download publish artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: publish-*
          path: artifacts/publish-artifacts

      - name: Rebuild publish layout for audit
        shell: bash
        run: |
          mkdir -p artifacts/publish
          for artifact in artifacts/publish-artifacts/publish-*; do
            target="${artifact##*/publish-}"
            rm -rf "artifacts/publish/$target"
            mv "$artifact" "artifacts/publish/$target"
          done

      - name: Install release audit tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binutils

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: artifacts/package
          merge-multiple: true

      - name: Download release evidence
        uses: actions/download-artifact@v4
        with:
          pattern: release-evidence-*
          path: artifacts/release-evidence
          merge-multiple: true

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd artifacts/package
          sha256sum PixelEngine-Demo-* > SHA256SUMS

      - name: Audit release artifacts
        shell: bash
        run: bash ./tools/audit-release-artifacts.sh --publish-root artifacts/publish --package-root artifacts/package --require-all

      - name: Verify deterministic package hashes
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/release-evidence artifacts/package-deterministic
          report="artifacts/release-evidence/deterministic-hash.md"
          rids=(win-x64 win-arm64 linux-x64 linux-arm64 osx-x64 osx-arm64)
          channels=(r2r aot)
          conclusion=success
          rows=()

          sha256_file() {
            sha256sum "$1" | awk '{print $1}'
          }

          package_extension_for_rid() {
            case "$1" in
              win-*) printf 'zip' ;;
              *) printf 'tar.gz' ;;
            esac
          }

          for rid in "${rids[@]}"; do
            for channel in "${channels[@]}"; do
              extension="$(package_extension_for_rid "$rid")"
              original="$(find artifacts/package -maxdepth 1 -type f -name "PixelEngine-Demo-*-$rid-$channel.$extension" | sort | head -n 1)"
              publish_dir="artifacts/publish/$rid-$channel"
              if [[ -z "$original" || ! -d "$publish_dir" ]]; then
                conclusion=failure
                rows+=("| $rid | $channel | missing | missing original package or publish directory |")
                continue
              fi

              name="$(basename "$original")"
              version="${name#PixelEngine-Demo-}"
              version="${version%-$rid-$channel.$extension}"
              rm -f "artifacts/package-deterministic/PixelEngine-Demo-"*"-$rid-$channel.$extension"
              set +e
              bash ./tools/package.sh \
                --rid "$rid" \
                --channel "$channel" \
                --version "$version" \
                --publish-dir "$publish_dir" \
                --output-root artifacts/package-deterministic \
                --content-root demo/PixelEngine.Demo/content
              package_status=$?
              set -e
              if [[ "$package_status" -ne 0 ]]; then
                conclusion=failure
                rows+=("| $rid | $channel | failure | deterministic package command exited $package_status |")
                continue
              fi

              rebuilt="artifacts/package-deterministic/$name"
              if [[ ! -f "$rebuilt" ]]; then
                conclusion=failure
                rows+=("| $rid | $channel | missing | deterministic package was not produced |")
                continue
              fi

              original_hash="$(sha256_file "$original")"
              rebuilt_hash="$(sha256_file "$rebuilt")"
              if [[ "$original_hash" == "$rebuilt_hash" ]]; then
                rows+=("| $rid | $channel | match | $original_hash |")
              else
                conclusion=failure
                rows+=("| $rid | $channel | mismatch | original=$original_hash rebuilt=$rebuilt_hash |")
              fi
            done
          done

          {
            echo "# Deterministic hash evidence"
            echo
            echo "| Key | Value |"
            echo "|---|---|"
            echo "| run_id | ${{ github.run_id }} |"
            echo "| sha | ${{ github.sha }} |"
            echo "| conclusion | $conclusion |"
            echo
            echo "## Package rebuild comparison"
            echo
            echo "| RID | Channel | Result | Detail |"
            echo "|---|---|---|---|"
            printf '%s\n' "${rows[@]}"
          } > "$report"
          if [[ "$conclusion" != "success" ]]; then
            exit 1
          fi

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          body: |
            PixelEngine Demo release.

            Verification notes:
            - win-arm64 is load-only checked on the Windows x64 runner and remains a manual hardware gate.
            - linux-arm64 is smoke-tested through QEMU when available.
            - macOS x64 and arm64 are smoke-tested on matching GitHub-hosted runners before signing/package upload.
          files: |
            artifacts/package/PixelEngine-Demo-*
            artifacts/package/SHA256SUMS

      - name: Build release evidence manifest
        if: always()
        shell: pwsh
        run: |
          function Get-Sha256($path) {
            if ([string]::IsNullOrWhiteSpace($path) -or -not (Test-Path -LiteralPath $path -PathType Leaf)) {
              return ''
            }

            return (Get-FileHash -Algorithm SHA256 -LiteralPath $path).Hash
          }

          New-Item -ItemType Directory -Force -Path artifacts/release-evidence | Out-Null
          @(
            "# Workflow run evidence",
            "",
            "| Key | Value |",
            "|---|---|",
            "| run_id | ${{ github.run_id }} |",
            "| sha | ${{ github.sha }} |",
            "| ref | ${{ github.ref }} |",
            "| conclusion | ${{ job.status }} |"
          ) | Set-Content -Path artifacts/release-evidence/workflow-run.md -Encoding UTF8
          @(
            "# GitHub Release upload evidence",
            "",
            "| Key | Value |",
            "|---|---|",
            "| tag | ${{ github.ref_name }} |",
            "| run_id | ${{ github.run_id }} |",
            "| sha | ${{ github.sha }} |",
            "| conclusion | ${{ job.status }} |"
          ) | Set-Content -Path artifacts/release-evidence/github-release-upload.md -Encoding UTF8
          @(
            "# R2R light-up evidence",
            "",
            "| Key | Value |",
            "|---|---|",
            "| run_id | ${{ github.run_id }} |",
            "| sha | ${{ github.sha }} |",
            "| conclusion | blocked_missing_target_disassembly |",
            "",
            "## Detail",
            "",
            "This release run verifies R2R publish layout and smoke execution, but it does not capture Tier-1 target-machine disassembly proving runtime SIMD light-up on representative AVX2/AVX-512 hardware. Do not treat this report as R2R light-up success."
          ) | Set-Content -Path artifacts/release-evidence/r2r-lightup.md -Encoding UTF8
          $rids = @('win-x64', 'win-arm64', 'linux-x64', 'linux-arm64', 'osx-x64', 'osx-arm64')
          $channels = @('r2r', 'aot')
          $artifacts = [ordered]@{}
          foreach ($rid in $rids) {
            $ridNode = [ordered]@{}
            foreach ($channel in $channels) {
              $packagePath = (Get-ChildItem -Path artifacts/package -File -Filter "PixelEngine-Demo-*-$rid-$channel.*" | Select-Object -First 1 -ExpandProperty FullName)
              $node = [ordered]@{
                publishReport = "artifacts/release-evidence/$rid-$channel-publish.md"
                publishSha256 = Get-Sha256 "artifacts/release-evidence/$rid-$channel-publish.md"
                verifyReport = "artifacts/release-evidence/$rid-$channel-verify.md"
                verifySha256 = Get-Sha256 "artifacts/release-evidence/$rid-$channel-verify.md"
                packageReport = "artifacts/release-evidence/$rid-$channel-package.md"
                packageReportSha256 = Get-Sha256 "artifacts/release-evidence/$rid-$channel-package.md"
                package = $packagePath
                packageSha256 = Get-Sha256 $packagePath
                checksum = "artifacts/package/SHA256SUMS"
                checksumSha256 = Get-Sha256 "artifacts/package/SHA256SUMS"
              }
              if ($channel -eq 'aot') {
                $node.simdProbe = "artifacts/release-evidence/$rid-$channel-simd.md"
                $node.simdProbeSha256 = Get-Sha256 "artifacts/release-evidence/$rid-$channel-simd.md"
                $node.simdProbeKind = if ($rid.EndsWith('-x64')) { 'x64_ymm_zmm' } else { 'arm64_neon' }
              }
              if ($rid.StartsWith('osx-')) {
                $node.codesignReport = "artifacts/release-evidence/$rid-$channel-codesign.md"
                $node.codesignSha256 = Get-Sha256 "artifacts/release-evidence/$rid-$channel-codesign.md"
                $node.notarizationReport = "artifacts/release-evidence/$rid-$channel-notarization.md"
                $node.notarizationSha256 = Get-Sha256 "artifacts/release-evidence/$rid-$channel-notarization.md"
              }
              $ridNode[$channel] = $node
            }
            $artifacts[$rid] = $ridNode
          }
          $manifest = [ordered]@{
            schemaVersion = 1
            workflowRunReport = 'artifacts/release-evidence/workflow-run.md'
            workflowRunSha256 = Get-Sha256 'artifacts/release-evidence/workflow-run.md'
            deterministicHashReport = 'artifacts/release-evidence/deterministic-hash.md'
            deterministicHashSha256 = Get-Sha256 'artifacts/release-evidence/deterministic-hash.md'
            r2rLightupReport = 'artifacts/release-evidence/r2r-lightup.md'
            r2rLightupSha256 = Get-Sha256 'artifacts/release-evidence/r2r-lightup.md'
            githubRelease = [ordered]@{
              uploadReport = 'artifacts/release-evidence/github-release-upload.md'
              uploadSha256 = Get-Sha256 'artifacts/release-evidence/github-release-upload.md'
            }
            artifacts = $artifacts
          }
          $manifest | ConvertTo-Json -Depth 10 | Set-Content -Path artifacts/release-evidence/evidence.json -Encoding UTF8

      - name: Preflight release evidence
        if: always()
        shell: pwsh
        run: ./tools/release-evidence-preflight.ps1 -EvidenceManifestPath artifacts/release-evidence/evidence.json -AllowBlocked

      - name: Upload release evidence report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-final
          if-no-files-found: error
          path: artifacts/release-evidence
